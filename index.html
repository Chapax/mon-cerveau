<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mon Cerveau v2</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:linear-gradient(160deg,#0a0a0f,#12121f,#0d1117);color:#e0e0e0;font-family:'Space Grotesk',system-ui,sans-serif;font-size:14px}
#app{height:100vh;display:flex;flex-direction:column}
#err{color:#ef4444;font-size:11px;white-space:pre-wrap;padding:10px;background:rgba(239,68,68,0.1);display:none;position:fixed;top:0;left:0;right:0;z-index:999;max-height:40vh;overflow:auto}
</style>
</head>
<body>
<div id="err"></div>
<div id="app">Chargement...</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
window.onerror=function(msg,src,line,col){
  var el=document.getElementById("err");
  el.style.display="block";
  el.textContent+="ERR: "+msg+" (L"+line+")\n";
};

try{

var h=React.createElement;
var us=React.useState;
var ue=React.useEffect;
var uc=React.useCallback;
var ur=React.useRef;

var SK="mcv2_";
function ld(k,fb){try{var r=localStorage.getItem(SK+k);return r?JSON.parse(r):fb}catch(e){return fb}}
function sv(k,v){try{localStorage.setItem(SK+k,JSON.stringify(v))}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

function fmt(ts){
  var d=new Date(ts);
  var df=Date.now()-d;
  if(df<60000)return "maintenant";
  if(df<3600000)return Math.floor(df/60000)+"min";
  if(df<86400000)return Math.floor(df/3600000)+"h";
  return d.toLocaleDateString("fr-FR",{day:"numeric",month:"short"});
}
function isToday(ts){return new Date(ts).toDateString()===new Date().toDateString()}

var QUADS=[
  {key:"q1",label:"FAIRE",color:"#ef4444",bg:"rgba(239,68,68,0.08)",brd:"rgba(239,68,68,0.2)"},
  {key:"q2",label:"PLANIFIER",color:"#f59e0b",bg:"rgba(245,158,11,0.08)",brd:"rgba(245,158,11,0.2)"},
  {key:"q3",label:"DELEGUER",color:"#3b82f6",bg:"rgba(59,130,246,0.08)",brd:"rgba(59,130,246,0.2)"},
  {key:"q4",label:"ELIMINER",color:"#6b7280",bg:"rgba(107,114,128,0.08)",brd:"rgba(107,114,128,0.2)"}
];

function qOf(k){
  for(var i=0;i<QUADS.length;i++){if(QUADS[i].key===k)return QUADS[i]}
  return QUADS[3];
}

var QO={q1:0,q2:1,q3:2,q4:3};
var JCATS=["Probleme resolu","Idee","Amelioration","Note","Victoire"];
var JCOL={"Probleme resolu":"#34d399","Idee":"#fbbf24","Amelioration":"#60a5fa","Note":"#a78bfa","Victoire":"#f472b6"};
var POMOW=25*60;
var POMOB=5*60;

// Styles object
var S={};
S.inp={background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:10,color:"#e0e0e0",padding:"12px 16px",fontSize:14,fontFamily:"inherit",outline:"none",width:"100%"};
S.btn={background:"linear-gradient(135deg,#8b5cf6,#7c3aed)",border:"none",color:"#fff",padding:"10px 20px",borderRadius:10,fontFamily:"inherit",fontSize:13,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"};
S.ghost={background:"transparent",border:"1px solid rgba(255,255,255,.1)",color:"#999",padding:"6px 12px",borderRadius:8,fontFamily:"inherit",fontSize:11,cursor:"pointer"};
S.card={background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:12,padding:"10px 14px",marginBottom:6};
S.ib={background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#666",padding:"2px 4px",fontFamily:"inherit"};
S.tag={fontSize:9,fontWeight:600,padding:"2px 8px",borderRadius:20,display:"inline-block",marginRight:4};

function App(){
  var _tab=us("flash"),tab=_tab[0],setTab=_tab[1];
  var _toast=us(null),toast=_toast[0],setToast=_toast[1];
  var tTm=ur(null);

  var _fl=us(function(){return ld("fl",[])}),fl=_fl[0],sFl=_fl[1];
  var _tk=us(function(){return ld("tk",[])}),tk=_tk[0],sTk=_tk[1];
  var _jn=us(function(){return ld("jn",[])}),jn=_jn[0],sJn=_jn[1];
  var _ar=us(function(){return ld("ar",[])}),ar=_ar[0],sAr=_ar[1];
  var _ps=us(function(){return ld("ps",[])}),ps=_ps[0],sPs=_ps[1];

  var _fi=us(""),fi=_fi[0],sFi=_fi[1];
  var _ti=us(""),ti=_ti[0],sTi=_ti[1];
  var _ji=us(""),ji=_ji[0],sJi=_ji[1];
  var _jc=us(JCATS[0]),jc=_jc[0],sJc=_jc[1];
  var _nq=us("q1"),nq=_nq[0],sNq=_nq[1];
  var _vm=us(function(){return ld("vm","list")}),vm=_vm[0],sVm=_vm[1];
  var _jf=us("Tout"),jf=_jf[0],sJf=_jf[1];

  var _ei=us(null),ei=_ei[0],sEi=_ei[1];
  var _et=us(""),et=_et[0],sEt=_et[1];
  var _eq2=us("q1"),eqv=_eq2[0],sEq=_eq2[1];
  var _ec=us(JCATS[0]),ec=_ec[0],sEc=_ec[1];
  var _cf=us(null),cf=_cf[0],sCf=_cf[1];

  var _po=us(false),po=_po[0],sPo=_po[1];
  var _pt=us(POMOW),pt=_pt[0],sPt=_pt[1];
  var _pb=us(false),pb=_pb[0],sPb=_pb[1];
  var pRef=ur(null);

  ue(function(){sv("fl",fl)},[fl]);
  ue(function(){sv("tk",tk)},[tk]);
  ue(function(){sv("jn",jn)},[jn]);
  ue(function(){sv("ar",ar)},[ar]);
  ue(function(){sv("ps",ps)},[ps]);
  ue(function(){sv("vm",vm)},[vm]);

  var shT=uc(function(m){
    clearTimeout(tTm.current);
    setToast(m);
    tTm.current=setTimeout(function(){setToast(null)},2000);
  },[]);

  // Pomo
  ue(function(){
    if(po){
      pRef.current=setInterval(function(){
        sPt(function(prev){
          if(prev<=1){
            clearInterval(pRef.current);
            if(!pb){
              sPs(function(p){var n=p.concat([{id:uid(),ts:Date.now()}]);sv("ps",n);return n});
              shT("Session terminee!");sPb(true);sPo(false);return POMOB;
            }else{
              shT("Pause finie!");sPb(false);sPo(false);return POMOW;
            }
          }
          return prev-1;
        });
      },1000);
    }else{
      clearInterval(pRef.current);
    }
    return function(){clearInterval(pRef.current)};
  },[po,pb]);

  function fmtP(s){return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0")}
  var ppct=pb?((POMOB-pt)/POMOB)*100:((POMOW-pt)/POMOW)*100;

  function getSetter(src){
    if(src==="flash")return sFl;
    if(src==="tasks")return sTk;
    if(src==="journal")return sJn;
    return null;
  }
  function getData(src){
    if(src==="flash")return fl;
    if(src==="tasks")return tk;
    if(src==="journal")return jn;
    return [];
  }

  function del(st,id){st(function(p){return p.filter(function(x){return x.id!==id})})}
  function upd(st,id,u){st(function(p){return p.map(function(x){
    if(x.id===id){var n={};var k;for(k in x)n[k]=x[k];for(k in u)n[k]=u[k];return n}
    return x;
  })})}

  function doArc(src,id){
    var data=getData(src);
    var setter=getSetter(src);
    var it=null;
    for(var i=0;i<data.length;i++){if(data[i].id===id){it=data[i];break}}
    if(!it)return;
    var a={};var k;for(k in it)a[k]=it[k];
    a._src=src;a._at=Date.now();
    sAr(function(p){return [a].concat(p)});
    setter(function(p){return p.filter(function(x){return x.id!==id})});
    shT("Archive!");
  }

  function restoreArc(aid){
    var it=null;
    for(var i=0;i<ar.length;i++){if(ar[i].id===aid){it=ar[i];break}}
    if(!it)return;
    var c={};var k;for(k in it){if(k!=="_src"&&k!=="_at")c[k]=it[k]}
    var setter=getSetter(it._src);
    if(setter)setter(function(p){return [c].concat(p)});
    sAr(function(p){return p.filter(function(x){return x.id!==aid})});
    shT("Restaure!");
  }

  function bulkDel(src){
    sCf({msg:"Tout supprimer?",fn:function(){getSetter(src)([]);shT("Vide!");sCf(null)}});
  }

  function addFl(){if(!fi.trim())return;sFl(function(p){return [{id:uid(),text:fi.trim(),ts:Date.now(),quad:nq,pin:false}].concat(p)});sFi("");shT("Capture!")}
  function fl2Tk(f){sTk(function(p){return [{id:uid(),text:f.text,ts:Date.now(),quad:f.quad,done:false}].concat(p)});del(sFl,f.id);shT("->Tache!")}
  function addTk(){if(!ti.trim())return;sTk(function(p){return [{id:uid(),text:ti.trim(),ts:Date.now(),quad:nq,done:false}].concat(p)});sTi("");shT("Ajoutee!")}
  function togTk(id){
    var t=null;for(var i=0;i<tk.length;i++){if(tk[i].id===id){t=tk[i];break}}
    if(t)upd(sTk,id,{done:!t.done,doneAt:!t.done?Date.now():null});
  }
  function addJn(){if(!ji.trim())return;sJn(function(p){return [{id:uid(),text:ji.trim(),cat:jc,ts:Date.now(),quad:nq}].concat(p)});sJi("");shT("Enregistre!")}

  function openEd(it,src){
    var o={};var k;for(k in it)o[k]=it[k];o._src=src;
    sEi(o);sEt(it.text);sEq(it.quad||"q1");sEc(it.cat||JCATS[0]);
  }
  function saveEd(){
    if(!ei)return;
    var u={text:et,quad:eqv};
    if(ei._src==="journal")u.cat=ec;
    upd(getSetter(ei._src),ei.id,u);
    sEi(null);shT("Modifie!");
  }

  var filtJ=jf==="Tout"?jn:jn.filter(function(j){return j.cat===jf});

  // QS
  function QS(val,onCh){
    return h("div",{style:{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}},
      QUADS.map(function(q){
        var ac=val===q.key;
        return h("button",{key:q.key,onClick:function(){onCh(q.key)},style:{
          padding:"5px 10px",borderRadius:8,fontSize:10,fontFamily:"inherit",fontWeight:600,cursor:"pointer",
          background:ac?q.bg:"transparent",border:"2px solid "+(ac?q.color:"rgba(255,255,255,0.08)"),color:ac?q.color:"#666"
        }},q.label);
      })
    );
  }

  // List items
  function renderList(items,src){
    var sorted=items.slice().sort(function(a,b){
      if(src==="tasks"&&a.done!==b.done)return a.done?1:-1;
      if(src==="flash"){var pa=a.pin?0:1;var pbn=b.pin?0:1;if(pa!==pbn)return pa-pbn}
      return (QO[a.quad||"q4"])-(QO[b.quad||"q4"])||(b.ts-a.ts);
    });
    if(sorted.length===0)return h("div",{style:{textAlign:"center",color:"#444",padding:30}},"Rien ici");
    return h("div",null,sorted.map(function(item){
      var q=qOf(item.quad);
      var isDone=src==="tasks"&&item.done;
      var cStyle={};var k;for(k in S.card)cStyle[k]=S.card[k];
      cStyle.borderLeft="3px solid "+(isDone?"#333":q.color);
      if(isDone)cStyle.opacity="0.35";

      var els=[];
      if(src==="tasks"){
        els.push(h("div",{key:"cb",onClick:function(){togTk(item.id)},style:{
          width:20,height:20,borderRadius:6,flexShrink:0,marginTop:2,cursor:"pointer",
          border:"2px solid "+(isDone?"#333":q.color),background:isDone?"#333":"transparent",
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff"
        }},isDone?"v":null));
      }

      var txtS={fontSize:13,color:isDone?"#555":"#d0d0d0",lineHeight:"1.5",wordBreak:"break-word"};
      if(isDone)txtS.textDecoration="line-through";

      var tagEls=[];
      tagEls.push(h("span",{key:"q",style:{fontSize:9,fontWeight:600,padding:"2px 8px",borderRadius:20,background:q.bg,color:q.color,display:"inline-block",marginRight:4}},q.label));
      if(src==="journal"&&item.cat){
        var jc2=JCOL[item.cat]||"#888";
        tagEls.push(h("span",{key:"c",style:{fontSize:9,fontWeight:600,padding:"2px 8px",borderRadius:20,background:jc2+"18",color:jc2,display:"inline-block",marginRight:4}},item.cat));
      }
      tagEls.push(h("span",{key:"d",style:{fontSize:9,color:"#444"}},fmt(item.ts)));

      var actEls=[];
      if(src==="flash"){
        actEls.push(h("button",{key:"pin",style:S.ib,onClick:function(){upd(sFl,item.id,{pin:!item.pin})}},item.pin?"unpin":"pin"));
        actEls.push(h("button",{key:"2t",style:S.ib,onClick:function(){fl2Tk(item)}},">tache"));
      }
      actEls.push(h("button",{key:"ed",style:S.ib,onClick:function(){openEd(item,src)}},"edit"));
      actEls.push(h("button",{key:"ar",style:S.ib,onClick:function(){doArc(src,item.id)}},"arc"));
      actEls.push(h("button",{key:"x",style:S.ib,onClick:function(){del(getSetter(src),item.id);shT("Supprime!")}},"x"));

      els.push(h("div",{key:"m",style:{flex:1,minWidth:0}},
        h("div",{style:txtS},item.text),
        h("div",{style:{display:"flex",gap:4,alignItems:"center",marginTop:5,flexWrap:"wrap"}},tagEls)
      ));
      els.push(h("div",{key:"a",style:{display:"flex",gap:2,flexShrink:0,flexWrap:"wrap"}},actEls));

      return h("div",{key:item.id,style:cStyle},
        h("div",{style:{display:"flex",alignItems:"flex-start",gap:10}},els)
      );
    }));
  }

  // Grid items
  function renderGrid(items,src){
    var groups={q1:[],q2:[],q3:[],q4:[]};
    items.forEach(function(x){var k=x.quad||"q4";groups[k].push(x)});
    return h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
      QUADS.map(function(q){
        return h("div",{key:q.key,style:{background:q.bg,border:"1px solid "+q.brd,borderRadius:10,padding:10,minHeight:80}},
          h("div",{style:{fontSize:9,fontWeight:700,letterSpacing:1,marginBottom:8,color:q.color}},q.label+" ("+groups[q.key].length+")"),
          groups[q.key].length===0?h("div",{style:{fontSize:10,color:"#333",textAlign:"center"}},"-"):null,
          groups[q.key].map(function(item){
            var isDone=src==="tasks"&&item.done;
            return h("div",{key:item.id,style:{background:"rgba(0,0,0,.3)",borderRadius:8,padding:"6px 8px",marginBottom:3,fontSize:11,opacity:isDone?.35:1}},
              h("div",{style:{color:isDone?"#444":"#bbb",textDecoration:isDone?"line-through":"none",wordBreak:"break-word"}},
                src==="tasks"?h("span",{onClick:function(){togTk(item.id)},style:{cursor:"pointer",marginRight:4}},isDone?"[v]":"[ ]"):null,
                item.text
              ),
              h("div",{style:{display:"flex",gap:4,marginTop:3}},
                h("button",{style:{background:"none",border:"none",fontSize:9,color:"#555",cursor:"pointer",fontFamily:"inherit"},onClick:function(){openEd(item,src)}},"edit"),
                h("button",{style:{background:"none",border:"none",fontSize:9,color:"#555",cursor:"pointer",fontFamily:"inherit"},onClick:function(){doArc(src,item.id)}},"arc"),
                h("button",{style:{background:"none",border:"none",fontSize:9,color:"#555",cursor:"pointer",fontFamily:"inherit"},onClick:function(){del(getSetter(src),item.id)}},"x")
              )
            );
          })
        );
      })
    );
  }

  function toolbar(src,count){
    return h("div",{style:{display:"flex",gap:6,alignItems:"center",marginBottom:10}},
      h("button",{style:S.ghost,onClick:function(){sVm(vm==="grid"?"list":"grid")}},vm==="grid"?"Liste":"Grille"),
      h("span",{style:{fontSize:10,color:"#444",marginLeft:4}},count+" items"),
      h("div",{style:{flex:1}}),
      count>0?h("button",{style:{background:"none",border:"1px solid rgba(239,68,68,.2)",color:"#ef4444",padding:"3px 8px",borderRadius:8,fontSize:9,fontFamily:"inherit",cursor:"pointer"},onClick:function(){bulkDel(src)}},"Tout suppr"):null
    );
  }

  // BUILD
  var parts=[];

  // Header
  parts.push(h("div",{key:"hdr",style:{textAlign:"center",marginBottom:16}},
    h("div",{style:{fontSize:24}},"MC"),
    h("h1",{style:{fontFamily:"'Space Grotesk',sans-serif",fontSize:20,fontWeight:700,color:"#c4b5fd"}},"MON CERVEAU"),
    h("div",{style:{fontSize:9,color:"#555",letterSpacing:2,textTransform:"uppercase"}},"v2 - eisenhower")
  ));

  // FLASH
  if(tab==="flash"){
    parts.push(h("div",{key:"fl"},
      h("div",{style:{display:"flex",gap:8,marginBottom:8}},
        h("input",{style:S.inp,value:fi,placeholder:"Une idee...",onChange:function(e){sFi(e.target.value)},onKeyDown:function(e){if(e.key==="Enter")addFl()}}),
        h("button",{style:S.btn,onClick:addFl},"+")
      ),
      QS(nq,sNq),
      toolbar("flash",fl.length),
      vm==="grid"?renderGrid(fl,"flash"):renderList(fl,"flash")
    ));
  }

  // TASKS
  if(tab==="tasks"){
    parts.push(h("div",{key:"tk"},
      h("div",{style:{display:"flex",gap:8,marginBottom:8}},
        h("input",{style:S.inp,value:ti,placeholder:"Nouvelle tache...",onChange:function(e){sTi(e.target.value)},onKeyDown:function(e){if(e.key==="Enter")addTk()}}),
        h("button",{style:S.btn,onClick:addTk},"+")
      ),
      QS(nq,sNq),
      toolbar("tasks",tk.length),
      vm==="grid"?renderGrid(tk,"tasks"):renderList(tk,"tasks")
    ));
  }

  // JOURNAL
  if(tab==="journal"){
    parts.push(h("div",{key:"jn"},
      h("textarea",{style:Object.assign({},S.inp,{minHeight:50,marginBottom:8}),value:ji,placeholder:"Notes...",rows:2,onChange:function(e){sJi(e.target.value)},onKeyDown:function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();addJn()}}}),
      h("div",{style:{display:"flex",gap:4,marginBottom:6,flexWrap:"wrap"}},
        JCATS.map(function(c){return h("button",{key:c,style:Object.assign({},S.ghost,{borderColor:jc===c?"#60a5fa":"rgba(255,255,255,0.08)",color:jc===c?"#60a5fa":"#666",fontSize:10}),onClick:function(){sJc(c)}},c)})
      ),
      QS(nq,sNq),
      h("button",{style:Object.assign({},S.btn,{fontSize:11,padding:"6px 14px",marginBottom:8}),onClick:addJn},"Sauver"),
      h("div",{style:{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}},
        ["Tout"].concat(JCATS).map(function(c){return h("button",{key:c,onClick:function(){sJf(c)},style:{background:jf===c?"rgba(96,165,250,0.15)":"transparent",border:"none",color:jf===c?"#93c5fd":"#444",padding:"3px 8px",borderRadius:16,fontSize:9,cursor:"pointer",fontFamily:"inherit",fontWeight:600}},c)})
      ),
      toolbar("journal",filtJ.length),
      vm==="grid"?renderGrid(filtJ,"journal"):renderList(filtJ,"journal")
    ));
  }

  // POMO
  if(tab==="pomo"){
    var circ=2*Math.PI*88;
    parts.push(h("div",{key:"pm",style:{textAlign:"center"}},
      h("div",{style:{position:"relative",width:180,height:180,margin:"16px auto"}},
        h("svg",{width:"180",height:"180",viewBox:"0 0 200 200"},
          h("circle",{cx:"100",cy:"100",r:"88",fill:"none",stroke:"rgba(255,255,255,0.04)",strokeWidth:"6"}),
          h("circle",{cx:"100",cy:"100",r:"88",fill:"none",stroke:pb?"#34d399":"#8b5cf6",strokeWidth:"6",strokeLinecap:"round",strokeDasharray:String(circ),strokeDashoffset:String(circ*(1-ppct/100)),transform:"rotate(-90 100 100)"})
        ),
        h("div",{style:{position:"absolute",top:0,left:0,right:0,bottom:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}},
          h("div",{style:{fontSize:36,fontWeight:700,color:pb?"#34d399":"#e0e0e0",fontFamily:"monospace"}},fmtP(pt)),
          h("div",{style:{fontSize:10,color:"#555"}},pb?"PAUSE":"FOCUS")
        )
      ),
      h("div",{style:{display:"flex",gap:8,justifyContent:"center",marginTop:12}},
        h("button",{style:Object.assign({},S.btn,{background:po?"linear-gradient(135deg,#ef4444,#dc2626)":pb?"linear-gradient(135deg,#34d399,#059669)":S.btn.background}),onClick:function(){sPo(!po)}},po?"Stop":pb?"Pause":"Focus"),
        h("button",{style:S.ghost,onClick:function(){sPo(false);sPb(false);sPt(POMOW)}},"Reset")
      ),
      h("div",{style:{marginTop:20,fontSize:11,color:"#555"}},"Aujourd'hui: "+ps.filter(function(s){return isToday(s.ts)}).length+" sessions")
    ));
  }

  // ARCHIVE
  if(tab==="archive"){
    parts.push(h("div",{key:"arc"},
      h("div",{style:{fontSize:13,fontWeight:600,color:"#c4b5fd",marginBottom:12}},"Archives ("+ar.length+")"),
      ar.length===0?h("div",{style:{textAlign:"center",color:"#444",padding:30}},"Vide"):null,
      ar.length>0?h("button",{style:Object.assign({},S.ghost,{color:"#ef4444",marginBottom:10,fontSize:10}),onClick:function(){sCf({msg:"Vider?",fn:function(){sAr([]);shT("Vide!");sCf(null)}})}},"Tout vider"):null,
